<!doctype html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Didact+Gothic&family=Great+Vibes&family=Happy+Monkey&family=Orbitron:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Science+Gothic:wght@100..900&display=swap" 
rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Basketball Scoreboard</h1>
<div class="score-card">
<div class="teams">
<h2>HOME</h2>
<h2>GUEST</h2>
</div>
<div class="show-scores">
<h3 id="count-el" class="score">0</h3>
<h3 id="score-el" class="score">0</h3>
</div>
<div class="btn-container">
<div class="incrementing-btns">
<button class="btns" onclick="incrementOnce()">+1</button>
<button class="btns" onclick="incrementTwice()">+2</button> 
<button class="btns" onclick="incrementThrice()">+3</button>
</div>
<div class="incrementing-btns">
<button class="btns" onclick="incrementOne()">+1</button>
<button class="btns" onclick="incrementTwo()">+2</button>
<button class="btns" onclick="incrementThree()">+3</button>
</div>
</div>
<button class="reset-btn" onclick="reset()">Reset</button>
</div>
<script src="index.js"></script>
</body>
</html>
